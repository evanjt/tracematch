services:
  web:
    build:
      context: .
      target: wasm-builder
    entrypoint: []
    # wasm-bindgen-rayon needs nightly + atomics. The container image's
    # default toolchain is set in the Dockerfile but we override on the
    # build command here too so the entrypoint rebuild uses the same
    # flags.
    command: >
      sh -c "
        cd tracematch-wasm &&
        RUSTUP_TOOLCHAIN=nightly-2025-09-15
        RUSTFLAGS='-C target-feature=+atomics,+bulk-memory,+mutable-globals'
        wasm-pack build --target web --release --features parallel -- -Z build-std=std,panic_abort &&
        cp -r pkg /shared/wasm
      "
    volumes:
      - wasm-pkg:/shared

  dev:
    image: node:22-slim
    working_dir: /app
    command: >
      sh -c "
        npm install &&
        mkdir -p src/lib/wasm/pkg &&
        echo 'Waiting for WASM build...' &&
        until [ -f /shared/wasm/tracematch_wasm_bg.wasm ]; do sleep 1; done &&
        cp -r /shared/wasm/* src/lib/wasm/pkg/ &&
        npm run dev -- --host 0.0.0.0 --port 5173
      "
    ports:
      - "5174:5173"
    volumes:
      - ./web:/app
      - /app/node_modules
      - wasm-pkg:/shared
    depends_on:
      - web

volumes:
  wasm-pkg:
