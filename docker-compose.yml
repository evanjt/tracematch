services:
  wasm:
    build:
      context: .
      target: wasm-dev
    entrypoint: []
    command: >
      sh -c "
        cd tracematch-wasm &&
        wasm-pack build --target web --release &&
        cp -r pkg/* /output/ &&
        cargo watch --poll -w ../src -w src -s '
          wasm-pack build --target web --release &&
          cp -r pkg/* /output/
        '
      "
    volumes:
      - .:/build
      - rust-target:/build/target
      - wasm-pkg:/output

  dev:
    image: node:22-slim
    working_dir: /app
    command: >
      sh -c "
        npm install &&
        echo 'Waiting for WASM build...' &&
        until [ -f /app/src/lib/wasm/pkg/tracematch_wasm_bg.wasm ]; do sleep 1; done &&
        npm run dev -- --host 0.0.0.0 --port 5173
      "
    ports:
      - "5174:5173"
    volumes:
      - ./web:/app
      - /app/node_modules
      - wasm-pkg:/app/src/lib/wasm/pkg
    depends_on:
      - wasm

volumes:
  wasm-pkg:
  rust-target:
